version: "3.9"

services:
  app:
    build: .
    container_name: real_estate_app
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongo
    volumes:
      - uploads:/app/public/uploads
      - logs:/app/logs

  mongo:
    image: mongo:4.4
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  uploads:
  logs: